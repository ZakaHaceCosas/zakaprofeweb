name: Deploy

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Entorno de despliegue"
                required: true
                type: choice
                options:
                    - preview
                    - production

jobs:
    deploy-profe:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - run: npm i -g vercel
            - run: |
                if [ "${{ github.event.inputs.environment }}" = "production" ]; then
                    vercel deploy --prod --token=$VERCEL_TOKEN
                else
                    vercel deploy --token=$VERCEL_TOKEN
                fi
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PROFE }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

    deploy-teka:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - run: npm i -g vercel
            - run: |
                if [ "${{ github.event.inputs.environment }}" = "production" ]; then
                    vercel deploy --prod --token=$VERCEL_TOKEN
                else
                    vercel deploy --token=$VERCEL_TOKEN
                fi
              env:
                  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
                  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TEKA }}
                  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
